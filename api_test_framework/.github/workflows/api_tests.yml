name: API Test Automation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]
      marker:
        description: "Pytest marker to run"
        required: false
        default: "smoke"

jobs:
  test:
    name: Run API Tests (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          pytest \
            -m "${{ github.event.inputs.marker || 'smoke' }}" \
            --html=reports/report.html \
            --self-contained-html \
            --json-report \
            --json-report-file=reports/report.json \
            -v

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-py${{ matrix.python-version }}
          path: reports/report.html

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-report-py${{ matrix.python-version }}
          path: reports/report.json

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-py${{ matrix.python-version }}
          path: logs/

      # Allure report (optional — uncomment if using allure-pytest)
